<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealerSim — Car Dealership Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand"><img class="ui-icon" src="assets/icons/car.svg" alt="Car"> DealerSim</div>

    <div class="stats-bar">
      <div class="stat-chip" id="stat-cash"><img class="ui-icon" src="assets/icons/cash.svg" alt="Cash"> $25,000</div>
      <div class="stat-chip" id="stat-day"><img class="ui-icon" src="assets/icons/calendar.svg" alt="Day"> Day 1</div>
      <div class="stat-chip" id="stat-rep"><img class="ui-icon" src="assets/icons/star.svg" alt="Rep"> Rep 1.00</div>
      <div class="stat-chip" id="stat-garage"><img class="ui-icon" src="assets/icons/home.svg" alt="Garage"> 0 / 5</div>
      <div class="stat-chip" id="stat-debt"><img class="ui-icon" src="assets/icons/bank.svg" alt="Debt"> Debt $0</div>
      <div class="stat-chip" id="stat-lease"><img class="ui-icon" src="assets/icons/document.svg" alt="Leases"> Leases 0 · $0/day</div>
    </div>

    <button class="btn btn-next-day" id="btn-next-day">Next Day ▶</button>
  </header>

  <div class="app-shell">
    <!-- ── Tab Navigation ─────────────────────────────────── -->
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" id="tab-btn-dashboard" data-tab="dashboard"  role="tab" aria-selected="true" aria-controls="tab-dashboard"><img class="ui-icon" src="assets/icons/chart-bar.svg" alt=""> Dashboard</button>
      <button class="tab-btn"        id="tab-btn-factory" data-tab="factory"    role="tab" aria-selected="false" aria-controls="tab-factory"><img class="ui-icon" src="assets/icons/factory.svg" alt=""> Factory</button>
      <button class="tab-btn"        id="tab-btn-usedmarket" data-tab="usedmarket" role="tab" aria-selected="false" aria-controls="tab-usedmarket"><img class="ui-icon" src="assets/icons/car.svg" alt=""> Used Market</button>
      <button class="tab-btn"        id="tab-btn-garage" data-tab="garage"     role="tab" aria-selected="false" aria-controls="tab-garage"><img class="ui-icon" src="assets/icons/key.svg" alt=""> Garage</button>
      <button class="tab-btn"        id="tab-btn-forsale" data-tab="forsale"    role="tab" aria-selected="false" aria-controls="tab-forsale"><img class="ui-icon" src="assets/icons/tag.svg" alt=""> For Sale</button>
      <button class="tab-btn"        id="tab-btn-finance" data-tab="finance"    role="tab" aria-selected="false" aria-controls="tab-finance"><img class="ui-icon" src="assets/icons/bank.svg" alt=""> Finance</button>
      <button class="tab-btn"        id="tab-btn-upgrades" data-tab="upgrades"   role="tab" aria-selected="false" aria-controls="tab-upgrades"><img class="ui-icon" src="assets/icons/arrow-up.svg" alt=""> Upgrades</button>
      <button class="tab-btn"        id="tab-btn-achievements" data-tab="achievements"   role="tab" aria-selected="false" aria-controls="tab-achievements"><img class="ui-icon" src="assets/icons/trophy.svg" alt=""> Achievements</button>
      <button class="tab-btn"        id="tab-btn-settings" data-tab="settings"   role="tab" aria-selected="false" aria-controls="tab-settings"><img class="ui-icon" src="assets/icons/gear.svg" alt=""> Settings</button>
    </nav>

    <!-- ── Tab Panels ─────────────────────────────────────── -->
    <main class="app-main">
      <div id="tab-dashboard"  class="tab-panel active"  role="tabpanel" aria-labelledby="tab-btn-dashboard"></div>
      <div id="tab-factory"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-factory"></div>
      <div id="tab-usedmarket" class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-usedmarket"></div>
      <div id="tab-garage"     class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-garage"></div>
      <div id="tab-forsale"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-forsale"></div>
      <div id="tab-finance"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-finance"></div>
      <div id="tab-upgrades"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-upgrades"></div>
      <div id="tab-achievements"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-achievements"></div>
      <div id="tab-settings"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-settings"></div>
    </main>
  </div>

  <!-- ── Toast Container ────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Confirmation Modal ─────────────────────────────── -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3 id="modal-title">Confirm</h3>
      <p  id="modal-message"></p>
      <div class="modal-actions">
        <button class="btn btn-danger"     id="modal-confirm">Confirm</button>
        <button class="btn btn-secondary"  id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for save import -->
  <input type="file" id="import-file" accept=".json" style="display:none" />

  <script type="module" src="app.js"></script>
</body>
</html>
