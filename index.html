<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealerSim — Car Dealership Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">🚗 DealerSim</div>

    <div class="stats-bar">
      <div class="stat-chip" id="stat-cash">💵 $25,000</div>
      <div class="stat-chip" id="stat-day">📅 Day 1</div>
      <div class="stat-chip" id="stat-rep">⭐ Rep 1.00</div>
      <div class="stat-chip" id="stat-garage">🏠 0 / 5</div>
      <div class="stat-chip" id="stat-debt">🏦 Debt $0</div>
      <div class="stat-chip" id="stat-lease">📝 Leases 0 · $0/day</div>
    </div>

    <button class="btn btn-next-day" id="btn-next-day">Next Day ▶</button>
  </header>

  <div class="app-shell">
    <!-- ── Tab Navigation ─────────────────────────────────── -->
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" id="tab-btn-dashboard" data-tab="dashboard"  role="tab" aria-selected="true" aria-controls="tab-dashboard">📊 Dashboard</button>
      <button class="tab-btn"        id="tab-btn-factory" data-tab="factory"    role="tab" aria-selected="false" aria-controls="tab-factory">🏭 Factory</button>
      <button class="tab-btn"        id="tab-btn-usedmarket" data-tab="usedmarket" role="tab" aria-selected="false" aria-controls="tab-usedmarket">🚗 Used Market</button>
      <button class="tab-btn"        id="tab-btn-garage" data-tab="garage"     role="tab" aria-selected="false" aria-controls="tab-garage">🔑 Garage</button>
      <button class="tab-btn"        id="tab-btn-forsale" data-tab="forsale"    role="tab" aria-selected="false" aria-controls="tab-forsale">🏷️ For Sale</button>
      <button class="tab-btn"        id="tab-btn-finance" data-tab="finance"    role="tab" aria-selected="false" aria-controls="tab-finance">🏦 Finance</button>
      <button class="tab-btn"        id="tab-btn-upgrades" data-tab="upgrades"   role="tab" aria-selected="false" aria-controls="tab-upgrades">⬆️ Upgrades</button>
      <button class="tab-btn"        id="tab-btn-achievements" data-tab="achievements"   role="tab" aria-selected="false" aria-controls="tab-achievements">🏆 Achievements</button>
      <button class="tab-btn"        id="tab-btn-settings" data-tab="settings"   role="tab" aria-selected="false" aria-controls="tab-settings">⚙️ Settings</button>
    </nav>

    <!-- ── Tab Panels ─────────────────────────────────────── -->
    <main class="app-main">
      <div id="tab-dashboard"  class="tab-panel active"  role="tabpanel" aria-labelledby="tab-btn-dashboard"></div>
      <div id="tab-factory"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-factory"></div>
      <div id="tab-usedmarket" class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-usedmarket"></div>
      <div id="tab-garage"     class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-garage"></div>
      <div id="tab-forsale"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-forsale"></div>
      <div id="tab-finance"    class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-finance"></div>
      <div id="tab-upgrades"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-upgrades"></div>
      <div id="tab-achievements"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-achievements"></div>
      <div id="tab-settings"   class="tab-panel"         role="tabpanel" aria-labelledby="tab-btn-settings"></div>
    </main>
  </div>

  <!-- ── Toast Container ────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Confirmation Modal ─────────────────────────────── -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3 id="modal-title">Confirm</h3>
      <p  id="modal-message"></p>
      <div class="modal-actions">
        <button class="btn btn-danger"     id="modal-confirm">Confirm</button>
        <button class="btn btn-secondary"  id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for save import -->
  <input type="file" id="import-file" accept=".json" style="display:none" />

  <script type="module" src="app.js"></script>
</body>
</html>
